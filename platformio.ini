; PlatformIO Project Configuration File
;
; ESP32-C3-Zero board controlling a SEI-1618PG fractional PLL
; (with external MC12034A dual-modulus prescaler) to synthesize
; 1656 MHz / 1728 MHz from a 10 MHz reference.
;
;   https://docs.platformio.org/page/projectconf.html

[env:esp32-c3-mini]
platform = espressif32
board = esp32-c3-devkitm-1   ; generic ESP32-C3 board def; same chip as ESP32-C3-Zero, works for build/flash
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
build_flags =
    -D CORE_DEBUG_LEVEL=1
lib_deps =
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11
